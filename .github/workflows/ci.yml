name: CI

# Runs on pushes to main and on every pull request — unscoped push+PR used to fire the
# suite twice per PR commit. Tests are fully offline (no API key), so quality checks run
# for free on every change.
on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same branch supersedes any still-running build.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          # Lightweight GUI deps so the file-extraction/output tests run for real.
          # (Gradio is intentionally NOT installed in CI — it's heavy and only needed to
          #  launch the app; the GUI tests import-skip it.)
          pip install pypdf python-docx reportlab

      - name: Lint (ruff)
        run: ruff check .

      - name: Run offline tests (no API key needed)
        run: pytest -q

      - name: Smoke-test the offline demo
        run: python -m src.cli --demo
